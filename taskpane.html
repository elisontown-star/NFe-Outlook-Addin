<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emissor de NF</title>

  <!-- Office JS é obrigatório em qualquer task pane -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div class="painel">
    <header class="painel__cabecalho">
      <div class="painel__marca">
        <img class="painel__selo-img" src="icon-128.png?v=5" alt="NFSe" />
        <div>
          <h1 class="painel__titulo">Emissor de Nota Fiscal</h1>
          <p class="painel__subtitulo">Atalhos para os portais oficiais</p>
        </div>
      </div>
      <div class="painel__usuario" id="painel-usuario">
        <span id="usuario-status"></span>
      </div>
    </header>

    <main class="painel__conteudo">

      <!-- ETAPA 1: seleção de estado -->
      <section class="etapa etapa--estado" id="etapa-estado" aria-label="Selecione o estado">
        <p class="painel__instrucao">
          Selecione o estado (UF) para acessar os portais de emissão e
          consulta de NF-e e NFC-e da SEFAZ correspondente.
        </p>
        <label class="campo-uf">
          <span class="campo-uf__rotulo">Estado (UF)</span>
          <select id="select-uf" class="campo-uf__select">
            <option value="">— Selecione —</option>
          </select>
        </label>
        <button id="btn-continuar" class="btn-primario" disabled>Continuar</button>
      </section>

      <!-- ETAPA 2: botões dos portais (oculta até escolher estado) -->
      <section class="etapa etapa--portais" id="etapa-portais" aria-label="Tipos de nota fiscal" hidden>
        <div class="estado-selecionado">
          <span class="estado-selecionado__label">Estado:</span>
          <strong id="uf-atual" class="estado-selecionado__uf"></strong>
          <button id="btn-trocar-uf" class="btn-trocar">trocar</button>
        </div>

        <div class="lista-atalhos">

          <button class="atalho" data-portal="nfe">
            <span class="atalho__icone" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" />
                <path d="M12 12l8-4.5" />
                <path d="M12 12v9" />
                <path d="M12 12L4 7.5" />
              </svg>
            </span>
            <span class="atalho__rotulo">
              <strong>NF-e</strong>
              <span class="atalho__descricao">Nota Fiscal Eletrônica — produtos</span>
            </span>
            <span class="atalho__seta" aria-hidden="true">↗</span>
          </button>

          <button class="atalho" data-portal="nfce">
            <span class="atalho__icone" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="20" r="1.4" />
                <circle cx="18" cy="20" r="1.4" />
                <path d="M3 4h2l2.4 12.2a1.6 1.6 0 0 0 1.6 1.3h8.6a1.6 1.6 0 0 0 1.6-1.3L21 8H6" />
              </svg>
            </span>
            <span class="atalho__rotulo">
              <strong>NFC-e</strong>
              <span class="atalho__descricao">Nota Fiscal ao Consumidor — varejo</span>
            </span>
            <span class="atalho__seta" aria-hidden="true">↗</span>
          </button>

          <button class="atalho" data-portal="nfse">
            <span class="atalho__icone" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 5.5l4 4" />
                <path d="M11 9 4 16v4h4l7-7" />
                <path d="M17.5 2.5a2.1 2.1 0 0 1 3 3l-2 2-3-3z" />
              </svg>
            </span>
            <span class="atalho__rotulo">
              <strong>NFS-e</strong>
              <span class="atalho__descricao">Nota Fiscal de Serviços — Emissor Nacional</span>
            </span>
            <span class="atalho__seta" aria-hidden="true">↗</span>
          </button>

        </div>
      </section>

      <p class="painel__rodape-aviso" id="aviso" role="status" aria-live="polite"></p>
    </main>

    <footer class="painel__rodape">
      <span class="painel__rodape-info">Portais oficiais das SEFAZ</span>
      <span class="painel__versao">v1.1.0</span>
    </footer>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
